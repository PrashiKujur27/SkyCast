<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyCast — Weather Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">⛅</span>
      <span class="logo-text">SkyCast</span>
    </div>

    <div class="search-bar">
      <input
        type="text"
        id="cityInput"
        placeholder="Search city..."
        autocomplete="off"
      />
      <button id="searchBtn" title="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button id="voiceBtn" title="Voice search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <div id="suggestions" class="suggestions hidden"></div>
    </div>

    <div class="header-controls">
      <button id="locationBtn" title="Use my location">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </button>
      <button id="themeToggle" title="Toggle theme">
        <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <select id="unitToggle">
        <option value="metric">°C</option>
        <option value="imperial">°F</option>
      </select>
    </div>
  </header>

  <!-- RECENT SEARCHES -->
  <div id="recentSearches" class="recent-searches hidden">
    <span class="recent-label">Recent:</span>
    <div id="recentList"></div>
    <button id="clearRecent">Clear</button>
  </div>

  <!-- LOADING -->
  <div id="loader" class="loader hidden">
    <div class="spinner"></div>
    <p>Fetching weather data...</p>
  </div>

  <!-- ERROR -->
  <div id="errorMsg" class="error-msg hidden">
    <span id="errorText">City not found. Please try again.</span>
  </div>

  <!-- MAIN CONTENT -->
  <main id="mainContent" class="main-content hidden">

    <!-- HERO CARD -->
    <section class="hero-card">
      <div class="hero-left">
        <p id="cityName" class="city-name"></p>
        <p id="countryDate" class="country-date"></p>
        <div class="temp-row">
          <img id="weatherIcon" src="" alt="weather icon" class="weather-icon-lg" />
          <span id="temperature" class="temperature"></span>
        </div>
        <p id="description" class="description"></p>
        <p id="feelsLike" class="feels-like"></p>
      </div>
      <div class="hero-right">
        <div class="stat-pill">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7z"/></svg>
          <span>Humidity</span>
          <strong id="humidity"></strong>
        </div>
        <div class="stat-pill">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
          <span>Wind</span>
          <strong id="windSpeed"></strong>
        </div>
        <div class="stat-pill">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>Pressure</span>
          <strong id="pressure"></strong>
        </div>
        <div class="stat-pill">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Visibility</span>
          <strong id="visibility"></strong>
        </div>
        <div class="stat-pill">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
          <span>Sunrise</span>
          <strong id="sunrise"></strong>
        </div>
        <div class="stat-pill">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
          <span>Sunset</span>
          <strong id="sunset"></strong>
        </div>
      </div>
    </section>

    <!-- 5-DAY FORECAST -->
    <section class="section">
      <h2 class="section-title">5-Day Forecast</h2>
      <div id="forecastCards" class="forecast-grid"></div>
    </section>

    <!-- HOURLY CHART -->
    <section class="section">
      <h2 class="section-title">24-Hour Temperature</h2>
      <div class="chart-wrapper">
        <canvas id="tempChart"></canvas>
      </div>
    </section>

    <!-- HUMIDITY CHART -->
    <section class="section">
      <h2 class="section-title">Humidity Trend</h2>
      <div class="chart-wrapper">
        <canvas id="humidityChart"></canvas>
      </div>
    </section>

  </main>

  <!-- WELCOME SCREEN -->
  <div id="welcomeScreen" class="welcome-screen">
    <div class="welcome-content">
      <div class="welcome-icon">⛅</div>
      <h1>SkyCast</h1>
      <p>Real-time weather for any city in the world.</p>
      <p class="hint">Search a city above, or <button id="detectLocation" class="inline-btn">detect my location</button></p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
